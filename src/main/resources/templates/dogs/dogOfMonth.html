<!DOCTYPE html>

<html xmlns:th="https://www.thymeleaf.org" th:replace="~{fragments/layout :: layout (~{::body},'dogs')}">

<body>

  <style>
    .dotm-section {
      padding: 2rem 0;
    }
    .dotm-header {
      text-align: center;
      margin-bottom: 1.5rem;
    }
    .dotm-header h2 {
      font-size: 2rem;
      color: #6db33f;
    }
    .dotm-header .month-badge {
      display: inline-block;
      background-color: #6db33f;
      color: #fff;
      padding: 0.25rem 0.75rem;
      border-radius: 1rem;
      font-size: 0.9rem;
      margin-bottom: 0.5rem;
    }
    .dotm-card {
      border: none;
      box-shadow: 0 2px 12px rgba(0,0,0,0.12);
      border-radius: 0.5rem;
      overflow: hidden;
    }
    .dotm-main-photo {
      width: 100%;
      height: 360px;
      object-fit: cover;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .dotm-main-photo:hover {
      opacity: 0.9;
    }
    .dotm-info {
      padding: 1.25rem;
    }
    .dotm-info h3 {
      font-size: 1.6rem;
      margin-bottom: 0.25rem;
    }
    .dotm-info .breed-age {
      color: #6c757d;
      margin-bottom: 0.75rem;
    }
    .dotm-thumbnails {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
      margin-top: 1rem;
    }
    .dotm-thumb {
      width: 80px;
      height: 60px;
      object-fit: cover;
      border-radius: 4px;
      cursor: pointer;
      border: 2px solid transparent;
      transition: border-color 0.15s, transform 0.15s;
    }
    .dotm-thumb:hover,
    .dotm-thumb.active {
      border-color: #6db33f;
      transform: scale(1.05);
    }
    .dotm-no-dog {
      text-align: center;
      padding: 3rem;
      color: #6c757d;
    }
    /* Lightbox */
    .dotm-lightbox-img {
      max-height: 70vh;
      object-fit: contain;
      width: 100%;
    }
    .dotm-lightbox-caption {
      text-align: center;
      color: #6c757d;
      margin-top: 0.5rem;
    }
    .dotm-lightbox-counter {
      text-align: center;
      font-size: 0.85rem;
      color: #999;
      margin-top: 0.25rem;
    }
    .dotm-lightbox-nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 0.75rem;
    }
    .modal-header .modal-title {
      font-weight: 600;
    }
  </style>

  <div class="dotm-section">
    <div class="dotm-header">
      <div class="month-badge" th:text="${currentMonth + ' ' + currentYear}">MARCH 2026</div>
      <h2><span class="fa fa-paw" aria-hidden="true"></span> <span th:text="#{dogOfMonth.title}">Dog of the Month</span></h2>
      <p class="text-muted" th:text="#{dogOfMonth.subtitle}">Meet our featured dog — a new star every month!</p>
    </div>

    <div th:if="${featuredDog == null}" class="dotm-no-dog">
      <span class="fa fa-paw fa-3x mb-3" style="color:#ccc;"></span>
      <h4 th:text="#{dogOfMonth.comingSoon.title}">Coming Soon</h4>
      <p th:text="#{dogOfMonth.comingSoon.text}">No featured dog has been selected for this month yet. Check back soon!</p>
    </div>

    <div th:if="${featuredDog != null}" class="row justify-content-center">
      <div class="col-lg-8">
        <div class="dotm-card card">

          <!-- Main photo -->
          <div th:if="${featuredDog.photos != null and !featuredDog.photos.empty}">
            <img
              id="dotm-main-img"
              th:src="${featuredDog.photos[0].photoUrl}"
              th:alt="${featuredDog.photos[0].caption}"
              class="dotm-main-photo"
              loading="lazy"
              data-bs-toggle="modal"
              data-bs-target="#dotmLightbox"
              th:data-photo-index="0"
              onclick="openLightbox(0)"
            />
          </div>
          <div th:if="${featuredDog.photos == null or featuredDog.photos.empty}"
               class="bg-light d-flex align-items-center justify-content-center"
               style="height:200px;">
            <span class="fa fa-paw fa-4x text-muted"></span>
          </div>

          <!-- Dog info -->
          <div class="dotm-info">
            <h3 th:text="${featuredDog.name}">Dog Name</h3>
            <p class="breed-age">
              <span class="fa fa-tag"></span>
              <span th:text="${featuredDog.breed}">Breed</span>
              &nbsp;&bull;&nbsp;
              <span class="fa fa-birthday-cake"></span>
              <span th:text="${featuredDog.age + ' year' + (featuredDog.age == 1 ? '' : 's') + ' old'}">3 years old</span>
            </p>
            <p th:text="${featuredDog.description}">Description</p>

            <!-- Thumbnails -->
            <div th:if="${featuredDog.photos != null and featuredDog.photos.size() > 1}" class="dotm-thumbnails">
              <img
                th:each="photo, iterStat : ${featuredDog.photos}"
                th:src="${photo.photoUrl}"
                th:alt="${photo.caption}"
                th:class="${iterStat.index == 0 ? 'dotm-thumb active' : 'dotm-thumb'}"
                th:id="'dotm-thumb-' + ${iterStat.index}"
                loading="lazy"
                th:onclick="'openLightbox(' + ${iterStat.index} + ')'"
              />
            </div>

            <!-- View gallery button -->
            <div th:if="${featuredDog.photos != null and !featuredDog.photos.empty}" class="mt-3">
              <button class="btn btn-success btn-sm" onclick="openLightbox(0)"
                      data-bs-toggle="modal" data-bs-target="#dotmLightbox">
                <span class="fa fa-search-plus"></span> View Gallery
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Lightbox Modal -->
  <div th:if="${featuredDog != null and featuredDog.photos != null and !featuredDog.photos.empty}">
    <div class="modal fade" id="dotmLightbox" tabindex="-1" aria-labelledby="dotmLightboxLabel" aria-hidden="true">
      <div class="modal-dialog modal-lg modal-dialog-centered">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title" id="dotmLightboxLabel"
                th:text="${featuredDog.name + ' — Photo Gallery'}">Gallery</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>
          <div class="modal-body">
            <img id="lightbox-img" src="" alt="" class="dotm-lightbox-img" loading="lazy" />
            <p id="lightbox-caption" class="dotm-lightbox-caption"></p>
            <p id="lightbox-counter" class="dotm-lightbox-counter"></p>
            <div class="dotm-lightbox-nav">
              <button class="btn btn-outline-secondary btn-sm" id="lb-prev" onclick="lightboxNav(-1)">
                <span class="fa fa-chevron-left"></span> Prev
              </button>
              <!-- Thumbnail strip -->
              <div class="d-flex gap-1 flex-wrap justify-content-center" id="lb-thumbs"></div>
              <button class="btn btn-outline-secondary btn-sm" id="lb-next" onclick="lightboxNav(1)">
                Next <span class="fa fa-chevron-right"></span>
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Lightbox JS (no external dependencies) -->
  <script th:inline="javascript">
    /*<![CDATA[*/
    var dotmPhotos = [];
    /*[# th:if="${featuredDog != null and featuredDog.photos != null}"]*/
    /*[# th:each="photo : ${featuredDog.photos}"]*/
    dotmPhotos.push({
      url: /*[(${photo.photoUrl})]*/ '',
      caption: /*[(${photo.caption})]*/ '',
      alt: /*[(${photo.caption})]*/ ''
    });
    /*[/]*/
    /*[/]*/
    var currentPhotoIndex = 0;

    function openLightbox(index) {
      currentPhotoIndex = index;
      updateLightbox();
      buildLightboxThumbs();
    }

    function updateLightbox() {
      if (dotmPhotos.length === 0) return;
      var photo = dotmPhotos[currentPhotoIndex];
      document.getElementById('lightbox-img').src = photo.url;
      document.getElementById('lightbox-img').alt = photo.alt;
      document.getElementById('lightbox-caption').textContent = photo.caption;
      document.getElementById('lightbox-counter').textContent =
        'Photo ' + (currentPhotoIndex + 1) + ' of ' + dotmPhotos.length;
      var thumbs = document.querySelectorAll('#lb-thumbs img');
      thumbs.forEach(function(t, i) {
        t.classList.toggle('dotm-thumb', true);
        t.classList.toggle('active', i === currentPhotoIndex);
      });
      updateMainThumbs();
    }

    function buildLightboxThumbs() {
      var container = document.getElementById('lb-thumbs');
      if (!container) return;
      container.innerHTML = '';
      dotmPhotos.forEach(function(photo, i) {
        var img = document.createElement('img');
        img.src = photo.url;
        img.alt = photo.caption;
        img.className = 'dotm-thumb' + (i === currentPhotoIndex ? ' active' : '');
        img.style.width = '56px';
        img.style.height = '42px';
        img.setAttribute('loading', 'lazy');
        img.onclick = function() {
          currentPhotoIndex = i;
          updateLightbox();
        };
        container.appendChild(img);
      });
    }

    function lightboxNav(direction) {
      currentPhotoIndex = (currentPhotoIndex + direction + dotmPhotos.length) % dotmPhotos.length;
      updateLightbox();
    }

    function updateMainThumbs() {
      dotmPhotos.forEach(function(photo, i) {
        var thumb = document.getElementById('dotm-thumb-' + i);
        if (thumb) thumb.classList.toggle('active', i === currentPhotoIndex);
      });
      var mainImg = document.getElementById('dotm-main-img');
      if (mainImg && dotmPhotos[currentPhotoIndex]) {
        mainImg.src = dotmPhotos[currentPhotoIndex].url;
      }
    }

    // Keyboard navigation
    document.addEventListener('keydown', function(e) {
      var modal = document.getElementById('dotmLightbox');
      if (!modal || !modal.classList.contains('show')) return;
      if (e.key === 'ArrowLeft') lightboxNav(-1);
      else if (e.key === 'ArrowRight') lightboxNav(1);
    });

    // Touch/swipe support
    var touchStartX = 0;
    var touchEndX = 0;
    document.addEventListener('touchstart', function(e) {
      touchStartX = e.changedTouches[0].screenX;
    });
    document.addEventListener('touchend', function(e) {
      touchEndX = e.changedTouches[0].screenX;
      var modal = document.getElementById('dotmLightbox');
      if (!modal || !modal.classList.contains('show')) return;
      var diff = touchStartX - touchEndX;
      if (Math.abs(diff) > 50) lightboxNav(diff > 0 ? 1 : -1);
    });
    /*]]>*/
  </script>

</body>

</html>
